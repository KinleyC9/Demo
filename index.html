<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Shop</title>
  <style>
    :root{--accent:#0d6efd;--muted:#666}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;margin:0;background:#f7f7f9;color:#111}
    header{background:white;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
    .brand{font-weight:700;color:var(--accent)}
    .search{max-width:420px;margin-left:1rem;flex:1}
    .search input{width:100%;padding:.5rem .75rem;border:1px solid #e1e1e6;border-radius:6px}
    .actions{display:flex;gap:.75rem;align-items:center}
    .cart{position:relative;cursor:pointer}
    .count{position:absolute;right:-8px;top:-8px;background:var(--accent);color:#fff;border-radius:999px;padding:2px 6px;font-size:12px}
    main{padding:1.5rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
    .card{background:white;padding:1rem;border-radius:8px;border:1px solid #eee;display:flex;flex-direction:column}
    .card img{width:100%;height:150px;object-fit:cover;border-radius:6px}
    .card h3{margin:.5rem 0 .25rem;font-size:1rem}
    .price{color:var(--accent);font-weight:600}
    .btn{margin-top:auto;padding:.5rem .75rem;border-radius:6px;border:0;background:var(--accent);color:white;cursor:pointer}
    .btn.secondary{background:#6c757d}
    footer{padding:1rem;text-align:center;color:var(--muted);font-size:14px}
    /* cart modal */
    .modal{position:fixed;right:16px;top:64px;width:320px;background:white;border:1px solid #eaeaea;border-radius:8px;box-shadow:0 8px 24px rgba(16,24,40,.12);padding:1rem;display:none;z-index:40}
    .modal.open{display:block}
    .cart-item{display:flex;gap:.5rem;margin-bottom:.5rem;align-items:center}
    .cart-item img{width:48px;height:48px;object-fit:cover;border-radius:6px}
    .total{font-weight:700;text-align:right;margin-top:.5rem}
    @media (max-width:520px){header{flex-direction:column;align-items:flex-start} .search{margin:0;margin-top:.5rem}}
  </style>
</head>
<body>
  <header>
    <div style="display:flex;align-items:center;gap:.5rem">
      <div class="brand">SimpleShop</div>
      <div class="search" style="max-width:420px">
        <input id="searchInput" placeholder="Search products..." />
      </div>
    </div>
    <div class="actions">
      <button class="btn secondary" id="clearBtn">Clear Cart</button>
      <div class="cart" id="cartBtn" aria-label="Cart">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3h2l.4 2M7 13h10l3-8H6.4" stroke="#111" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <div class="count" id="cartCount">0</div>
      </div>
    </div>
  </header>

  <main>
    <section class="grid" id="products">
      <article class="card" data-title="Classic Sneakers" data-price="59.99">
        <img src="https://via.placeholder.com/400x300?text=Sneakers" alt="Classic Sneakers">
        <h3>Classic Sneakers</h3>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem">
          <div><div class="price">$59.99</div><div style="color:var(--muted);font-size:13px">Comfortable everyday shoes</div></div>
          <button class="btn add">Add</button>
        </div>
      </article>

      <article class="card" data-title="Leather Wallet" data-price="29.50">
        <img src="https://via.placeholder.com/400x300?text=Wallet" alt="Leather Wallet">
        <h3>Leather Wallet</h3>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem">
          <div><div class="price">$29.50</div><div style="color:var(--muted);font-size:13px">Slim bi-fold wallet</div></div>
          <button class="btn add">Add</button>
        </div>
      </article>

      <article class="card" data-title="Wireless Headphones" data-price="89.00">
        <img src="https://via.placeholder.com/400x300?text=Headphones" alt="Wireless Headphones">
        <h3>Wireless Headphones</h3>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem">
          <div><div class="price">$89.00</div><div style="color:var(--muted);font-size:13px">Noise-cancelling</div></div>
          <button class="btn add">Add</button>
        </div>
      </article>
    </section>

    <div class="modal" id="cartModal" aria-hidden="true">
      <h4>Your Cart</h4>
      <div id="cartItems"></div>
      <div class="total" id="cartTotal">Total: $0.00</div>
      <div style="display:flex;gap:.5rem;margin-top:.75rem">
        <button class="btn" id="checkoutBtn">Checkout</button>
        <button class="btn secondary" id="closeCartBtn">Close</button>
      </div>
    </div>
  </main>

  <footer>
    Built with ❤️ — Demo shopping page
  </footer>

  <script>
    const cart = [];
    const cartCount = document.getElementById('cartCount');
    const cartBtn = document.getElementById('cartBtn');
    const cartModal = document.getElementById('cartModal');
    const cartItemsEl = document.getElementById('cartItems');
    const cartTotalEl = document.getElementById('cartTotal');
    const clearBtn = document.getElementById('clearBtn');
    const searchInput = document.getElementById('searchInput');

    function updateCartUI(){
      cartCount.textContent = cart.reduce((s,i)=>s+i.qty,0);
      cartItemsEl.innerHTML = '';
      cart.forEach(item=>{
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `<img src="https://via.placeholder.com/64?text=Img"><div style=\"flex:1\"><div>${item.title}</div><div style=\"color:var(--muted);font-size:13px\">$${item.price.toFixed(2)} x ${item.qty}</div></div><div style=\"font-weight:600\">$${(item.price*item.qty).toFixed(2)}</div>`;
        cartItemsEl.appendChild(div);
      });
      const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
      cartTotalEl.textContent = `Total: $${total.toFixed(2)}`;
    }

    function addToCart(title, price){
      const existing = cart.find(i=>i.title===title);
      if(existing) existing.qty++;
      else cart.push({title,price,qty:1});
      updateCartUI();
    }

    document.querySelectorAll('.add').forEach(btn=>{
      btn.addEventListener('click', e=>{
        const card = e.target.closest('.card');
        const title = card.dataset.title;
        const price = parseFloat(card.dataset.price);
        addToCart(title, price);
      });
    });

    cartBtn.addEventListener('click', ()=>{
      cartModal.classList.toggle('open');
      cartModal.setAttribute('aria-hidden', !cartModal.classList.contains('open'));
    });

    document.getElementById('closeCartBtn').addEventListener('click', ()=>{
      cartModal.classList.remove('open');
      cartModal.setAttribute('aria-hidden', 'true');
    });

    clearBtn.addEventListener('click', ()=>{
      cart.length = 0; updateCartUI();
    });

    document.getElementById('checkoutBtn').addEventListener('click', ()=>{
      if(cart.length===0) return alert('Cart is empty');
      alert('Checkout flow not implemented in this demo.');
    });

    searchInput.addEventListener('input', e=>{
      const q = e.target.value.toLowerCase().trim();
      document.querySelectorAll('.card').forEach(card=>{
        const title = card.dataset.title.toLowerCase();
        card.style.display = title.includes(q) ? '' : 'none';
      });
    });

    // init
    updateCartUI();
  </script>
</body>
</html>
